<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg        { fill: #f5f0e8; }
    .body      { fill: #b8001f; }
    .supraorb  { fill: #8a0015; }
    .cream     { fill: #f5f0e8; }
    .pupil     { fill: #0a0005; }
    @media (prefers-color-scheme: dark) {
      .bg       { fill: #1a1816; }
      .body     { fill: #e84058; }
      .supraorb { fill: #c02030; }
      .cream    { fill: #f0ebe2; }
      .pupil    { fill: #0a0005; }
    }
  </style>

  <rect width="100" height="100" class="bg"/>
  <ellipse cx="44" cy="48" rx="30" ry="34" class="body"/>
  <polygon points="72,32 90,28 95,38 92,50 84,52 72,44" class="body"/>
  <polygon points="84,36 92,33 92,47 84,46" class="cream"/>
  <polygon points="32,22 58,27 56,34 30,29" class="supraorb"/>
  <circle cx="50" cy="38" r="8"   class="cream"/>
  <circle cx="51" cy="39" r="4"   class="pupil"/>
  <circle cx="49" cy="37" r="1.5" class="cream"/>
</svg>
