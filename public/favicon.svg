<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#f5f0e8"/>

  <!-- Hovud: ellipse sentrert (44, 48) rx=30 ry=34 -->
  <ellipse cx="44" cy="48" rx="30" ry="34" fill="#b8001f"/>

  <!-- Nebb: polygon med krokforma spiss mot høgre.
       Går: (72,32)→(90,28)→(95,38)→(92,50)→(84,52)→(72,44)
       Øvre nebb stikk ut til x=95, kroken bøyer ned til y=50. -->
  <polygon points="72,32 90,28 95,38 92,50 84,52 72,44" fill="#b8001f"/>

  <!-- Krem-notch mellom mandiblene — gjer kroken synleg.
       Ligg inni nebbpolygonet (x=84–92, y=33–47). -->
  <polygon points="84,36 92,33 92,47 84,46" fill="#f5f0e8"/>

  <!-- Supraorbitalkant: mørk stripe ovanfor auget = "sint haukeblikk" -->
  <polygon points="32,22 58,27 56,34 30,29" fill="#8a0015"/>

  <!-- Auge -->
  <circle cx="50" cy="38" r="8"   fill="#f5f0e8"/>
  <circle cx="51" cy="39" r="4"   fill="#0a0005"/>
  <circle cx="49" cy="37" r="1.5" fill="#f5f0e8"/>
</svg>
